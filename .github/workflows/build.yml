name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Harbor
      uses: docker/login-action@v3
      with:
        registry: ${{ secrets.HARBOUR_REGISTRY }}
        username: ${{ secrets.HARBOUR_USERNAME }}
        password: ${{ secrets.HARBOUR_PASSWORD }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ secrets.HARBOUR_REGISTRY }}/packa/packa
        tags: |
          type=ref,event=tag
          type=raw,value=latest

    - name: Extract minor version for cache scope
      id: cache-scope
      run: |
        SCOPE=$(echo "${{ github.ref_name }}" | sed 's/\(v[0-9]*\.[0-9]*\).*/\1/')
        echo "scope=$SCOPE" >> $GITHUB_OUTPUT

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        build-args: |
          PACKA_VERSION=${{ github.ref_name }}
          PACKA_COMMIT=${{ github.sha }}
        cache-from: type=gha,scope=${{ steps.cache-scope.outputs.scope }}
        cache-to: type=gha,mode=max,scope=${{ steps.cache-scope.outputs.scope }}
