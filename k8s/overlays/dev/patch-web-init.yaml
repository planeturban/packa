# Fix hardcoded master.packa.svc.cluster.local URL in web init container
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: packa
spec:
  template:
    spec:
      initContainers:
        - name: wait-for-token
          args:
            - |
              if [ -f /data/web.db ]; then
                echo "[init] already bootstrapped, skipping token fetch"
                exit 0
              fi
              MASTER=https://master.packa-dev.svc.cluster.local:9000
              echo "[init] waiting for master bootstrap token..."
              while true; do
                RESP=$(curl -sfk "$MASTER/tls/token" 2>/dev/null)
                TOKEN=$(echo "$RESP" | grep -o '"token":"[^"]*"' | cut -d'"' -f4)
                if [ -n "$TOKEN" ]; then
                  echo "$TOKEN" > /run/bootstrap/token
                  echo "[init] token written, starting web"
                  break
                fi
                sleep 5
              done
