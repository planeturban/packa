apiVersion: v1
kind: ConfigMap
metadata:
  name: packa-config
  namespace: packa
data:
  packa.toml: |
    [master]
    bind     = "0.0.0.0"
    api_port = 9000

    [master.paths]
    prefix = "/media"    # matches the NFS mount in master/statefulset.yaml

    [master.scan]
    extensions = [".mkv", ".mp4", ".avi", ".mov"]
    # min_size = 100   # MB
    # max_size = 0     # MB, 0 = no limit

    # [master.tls]
    # disabled = true

    [worker]
    bind             = "0.0.0.0"
    api_port         = 8000
    master_host      = "master"
    master_port      = 9000
    # id is set per-worker via PACKA_WORKER_ID env var

    [worker.paths]
    prefix = "/media"    # matches the NFS mount in worker/statefulset.yaml

    [worker.ffmpeg]
    bin        = "ffmpeg"
    output_dir = "/output"    # matches the NFS mount in worker/statefulset.yaml
    extra_args = ""

    [worker.worker]
    batch_size    = 1
    poll_interval = 5

    [web]
    bind        = "0.0.0.0"
    port        = 8080
    master_host = "master"
    master_port = 9000
    # username  = "admin"
    # password  = "secret"
