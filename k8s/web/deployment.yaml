apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: packa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: packa-web
  template:
    metadata:
      labels:
        app: packa-web
    spec:
      initContainers:
        - name: wait-for-token
          image: curlimages/curl:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              MASTER=https://master.packa.svc.cluster.local:9000
              echo "[init] waiting for master bootstrap token..."
              until curl -sfk "$MASTER/tls/token" | grep -q '"token"'; do
                sleep 5
              done
              echo "[init] token available, starting web"
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      containers:
        - name: web
          image: ghcr.io/planeturban/packa:latest
          workingDir: /app
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          env:
            - name: PACKA_ROLE
              value: web
            - name: PACKA_CONFIG
              value: /etc/packa/packa.toml
            - name: PACKA_WEB_BOOTSTRAP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: packa-bootstrap-token
                  key: token
                  optional: true   # pod starts even if secret is empty; retries on next restart
          # - name: PACKA_WEB_USERNAME
          #   valueFrom:
          #     secretKeyRef:
          #       name: packa-secret
          #       key: web-username
          # - name: PACKA_WEB_PASSWORD
          #   valueFrom:
          #     secretKeyRef:
          #       name: packa-secret
          #       key: web-password
          volumeMounts:
            - name: config
              mountPath: /etc/packa
            - name: data
              mountPath: /data
      volumes:
        - name: config
          configMap:
            name: packa-config
            items:
              - key: packa.toml
                path: packa.toml
        - name: data
          emptyDir: {}   # web.db only; replace with PVC if you want sessions to survive pod restarts
