# Packa — configuration
# Copy to packa.toml and adjust values, then start with:
#   python -m master.master --config packa.toml
#   python -m worker.main   --config packa.toml
#   python -m web.main      --config packa.toml
#
# Configuration priority: config file < environment variables < CLI flags.
# Every setting below has a corresponding environment variable (see each section).
#
# ── mTLS quickstart ──────────────────────────────────────────────────────────
# TLS is enabled by default. On first start, master generates a self-signed CA
# and prints a bootstrap token (valid 10 min). Workers and web exchange that
# token for a client certificate on their first start. Certs are stored in each
# node's local database and renewed automatically.
#
# 1. Start master → note the bootstrap token in the log.
# 2. Set bootstrap_token below in [worker] and [web].
# 3. Start worker and web — they obtain certs and use HTTPS from that point on.
#
# To disable TLS entirely (plain HTTP): uncomment [master.tls] disabled = true
# and remove the bootstrap_token lines from worker and web.

# ---------------------------------------------------------------------------
# Master
# ---------------------------------------------------------------------------
# Env: PACKA_MASTER_BIND, PACKA_MASTER_API_PORT

[master]
bind     = "localhost"   # use "any" for 0.0.0.0
api_port = 9000

# TLS — master generates its own CA and cert on first start.
# Uncomment to disable TLS and use plain HTTP instead.
# Env: (no env var — use this flag or bring-your-own certs below)
# [master.tls]
# disabled = true

# Bring-your-own certificates (overrides auto-generated certs).
# Env: PACKA_MASTER_TLS_CERT, PACKA_MASTER_TLS_KEY, PACKA_TLS_CA
# [master.tls]
# cert = "/etc/packa/master.crt"
# key  = "/etc/packa/master.key"
# ca   = "/etc/packa/ca.crt"

[master.paths]
# Root path for the master node.
# - Stripped from file paths before sending to workers (e.g. /mnt/data/shows/ep1.mkv → shows/ep1.mkv)
# - Used as the root directory for POST /scan/start
# Env: PACKA_MASTER_PREFIX
prefix = "/mnt/data/"

[master.scan]
# File extensions to include when scanning (case-insensitive).
# Env: PACKA_MASTER_EXTENSIONS  (comma-separated, e.g. ".mkv,.mp4")
extensions = [".mkv", ".mp4", ".avi", ".mov"]

# File size limits in megabytes. 0 = no limit (default).
# Files outside this range are counted as skipped during a scan.
# Env: PACKA_MASTER_MIN_SIZE, PACKA_MASTER_MAX_SIZE
# min_size = 0
# max_size = 0

# Bytes read from the middle of each file to compute a content-based checksum
# for duplicate detection. Default is 4 MB. Larger values reduce false positives
# at the cost of slower scanning.
# Env: PACKA_MASTER_CHECKSUM_BYTES
# checksum_bytes = 4194304

# Probe loop — analyzes PENDING files via ffprobe before they become claimable by workers.
# probe_batch_size: how many files to probe concurrently per tick (default 20)
# probe_interval:   seconds to sleep when no pending files remain (default 60)
# Env: PACKA_MASTER_PROBE_BATCH_SIZE, PACKA_MASTER_PROBE_INTERVAL
# probe_batch_size = 20
# probe_interval   = 60

# Periodic re-scan of the path prefix. Also editable live from the Master tab
# (database override wins over env and file).
# Env: PACKA_MASTER_SCAN_PERIODIC_ENABLED, PACKA_MASTER_SCAN_INTERVAL
# [master.scan.periodic]
# enabled  = false
# interval = 60    # seconds (min 10)

# ---------------------------------------------------------------------------
# Worker
# ---------------------------------------------------------------------------
# Env: PACKA_WORKER_BIND, PACKA_WORKER_API_PORT,
#      PACKA_WORKER_MASTER_HOST, PACKA_WORKER_MASTER_PORT, PACKA_WORKER_ADVERTISE_HOST

[worker]
bind     = "localhost"   # use "any" for 0.0.0.0
api_port = 8000

# Master to register with and poll for jobs.
master_host    = "localhost"
master_port    = 9000
# advertise_host = ""   # auto-detected if omitted

# Unique identifier for this worker. Used by master to track which worker
# holds which file. Must be unique across all workers.
# Env: PACKA_WORKER_ID
#
# If omitted, the worker looks for a previously generated ID in its local
# database (worker.db). If none exists, a UUID is generated and stored there
# so the same ID is reused on subsequent restarts.
id = "storage-01"

# Bootstrap token — copy from the master startup log on first run.
# The worker exchanges this token for a TLS client certificate.
# Once the cert is stored in worker.db, this field is no longer needed
# (remove it or leave it; it won't re-bootstrap if a cert is already stored).
# Env: PACKA_WORKER_BOOTSTRAP_TOKEN
# bootstrap_token = ""

# Bring-your-own certificates (overrides auto-bootstrapped certs).
# Env: PACKA_WORKER_TLS_CERT, PACKA_WORKER_TLS_KEY, PACKA_TLS_CA
# [worker.tls]
# cert = "/etc/packa/worker.crt"
# key  = "/etc/packa/worker.key"
# ca   = "/etc/packa/ca.crt"

[worker.paths]
# Prefix prepended to relative paths received from master.
# Example: shows/ep1.mkv → /mnt/files/shows/ep1.mkv
# If omitted, master.paths.prefix is used instead.
# Env: PACKA_WORKER_PREFIX
prefix = "/mnt/files/"

[worker.ffmpeg]
# Env: PACKA_WORKER_FFMPEG_BIN, PACKA_WORKER_FFMPEG_OUTPUT_DIR, PACKA_WORKER_FFMPEG_EXTRA_ARGS

bin        = "ffmpeg"
output_dir = "/mnt/output"

# Optional extra arguments appended to every ffmpeg call (single string).
# Example: extra_args = "-metadata comment='packa'"
# Env: PACKA_WORKER_FFMPEG_EXTRA_ARGS
# extra_args = ""

# Restrict which encoders appear in the dashboard dropdown.
# Defaults to all defined encoders.
# encoders = ["libx265", "nvenc"]

# ── Encoder definitions ───────────────────────────────────────────────────────
# Each [worker.ffmpeg.encoder.<key>] section defines one encoder.
# Only the encoders you define here will appear in the dashboard dropdown.
# If no encoders are defined, libx265 is used as a bare fallback.
#
# display_name — optional human-readable label; shown as "display_name (key)" in the dropdown
# video_args   — ffmpeg video codec arguments

[worker.ffmpeg.encoder.libx265]
display_name = "Software"
video_args   = "-c:v libx265"

[worker.ffmpeg.encoder.nvenc]
display_name = "NVIDIA"
video_args   = "-c:v hevc_nvenc -preset p5 -cq 24"

[worker.ffmpeg.encoder.vaapi]
display_name = "Intel/AMD"
input_args   = "-init_hw_device vaapi=va:/dev/dri/renderD128 -hwaccel vaapi -hwaccel_device va -hwaccel_output_format vaapi"
video_args   = "-filter_hw_device va -c:v hevc_vaapi -rc_mode ICQ -global_quality 23"

[worker.ffmpeg.encoder.videotoolbox]
display_name = "Apple"
video_args   = "-c:v hevc_videotoolbox -q:v 65"

[worker.ffmpeg.encoder.rkmpp]
display_name = "Rockchip"
video_args   = "-c:v hevc_rkmpp -rc_mode CQP -qp_init 28"

# Custom encoder example:
# [worker.ffmpeg.encoder.nvenc_hq]
# display_name = "NVIDIA HQ"
# video_args   = "-c:v hevc_nvenc -preset p7 -cq 18"

[worker.worker]
# Env: PACKA_WORKER_POLL_INTERVAL

# Seconds between poll attempts when the job queue is empty.
poll_interval = 5

# Stepped early-cancellation thresholds: [[progress%, ratio], ...]
# At each progress point, cancel if projected output > source * ratio.
# The tightest reached threshold applies. Remove this line to disable early cancellation entirely.
# Env: PACKA_WORKER_CANCEL_THRESHOLDS  (format: "10.0:1.10,25.0:1.05,50.0:1.0")
# cancel_thresholds = [[10.0, 1.10], [25.0, 1.05], [50.0, 1.0]]

# ---------------------------------------------------------------------------
# Web frontend
# ---------------------------------------------------------------------------
# Env: PACKA_WEB_BIND, PACKA_WEB_PORT,
#      PACKA_WEB_USERNAME, PACKA_WEB_PASSWORD, PACKA_WEB_SECRET_KEY,
#      PACKA_WEB_MASTER_HOST, PACKA_WEB_MASTER_PORT

[web]
bind = "localhost"   # use "any" for 0.0.0.0
port = 8080

# Credentials for the login page.
# When TLS is active, login is always required even if these are not set.
# Env: PACKA_WEB_USERNAME, PACKA_WEB_PASSWORD
username = "admin"
password = "change-me"

# Which master to connect to.
master_host = "localhost"
master_port = 9000

# Bootstrap token — copy from the master startup log on first run.
# The web server exchanges this token for a TLS client certificate.
# Once the cert is stored in web.db, this field is no longer needed.
# Env: PACKA_WEB_BOOTSTRAP_TOKEN
# bootstrap_token = ""

# Bring-your-own certificates (overrides auto-bootstrapped certs).
# Env: PACKA_WEB_TLS_CERT, PACKA_WEB_TLS_KEY, PACKA_TLS_CA
# [web.tls]
# cert = "/etc/packa/web.crt"
# key  = "/etc/packa/web.key"
# ca   = "/etc/packa/ca.crt"
