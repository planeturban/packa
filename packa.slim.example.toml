# Packa — copy to packa.toml and adjust.
#
# TLS is on by default. Master prints a bootstrap token on first start.
# Set bootstrap_token in [worker] and [web] to obtain TLS certs automatically.
# To disable TLS: uncomment [master.tls] disabled = true.

[master]
bind     = "localhost"   # "any" for 0.0.0.0
api_port = 9000

# [master.tls]
# disabled = true   # uncomment for plain HTTP

[master.paths]
prefix = "/mnt/data/"   # stripped from paths before sending to workers

[master.scan]
extensions = [".mkv", ".mp4", ".avi", ".mov"]
# min_size = 0
# max_size = 0

# ---------------------------------------------------------------------------

[worker]
bind             = "localhost"
api_port         = 8000
master_host      = "localhost"
master_port      = 9000
id               = "storage-01"   # omit to auto-generate and persist a UUID
# bootstrap_token  = ""            # copy from master log; remove after first run

[worker.paths]
prefix = "/mnt/files/"   # prepended to paths from master; omit to reuse master prefix

[worker.ffmpeg]
bin        = "ffmpeg"
output_dir = "/mnt/output"
# extra_args = ""
# encoders   = ["libx265", "nvenc"]   # restrict dashboard dropdown

[worker.ffmpeg.encoder.libx265]
display_name = "Software"
video_args   = "-c:v libx265"

# [worker.ffmpeg.encoder.videotoolbox]
# display_name = "Apple"
# video_args   = "-c:v hevc_videotoolbox -q:v 65"

# [worker.ffmpeg.encoder.nvenc_hq]
# display_name = "NVIDIA HQ"
# video_args   = "-c:v hevc_nvenc -preset p7 -cq 18"

[worker.worker]
poll_interval     = 5
# cancel_thresholds = [[10.0, 1.10], [25.0, 1.05], [50.0, 1.0]]   # remove to disable early cancellation

# ---------------------------------------------------------------------------

[web]
bind             = "localhost"
port             = 8080
master_host      = "localhost"
master_port      = 9000
username         = "admin"
password         = "change-me"
# bootstrap_token  = ""   # copy from master log; remove after first run
