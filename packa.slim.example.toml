# Packa — copy to packa.toml and adjust.

[master]
bind     = "localhost"   # "any" for 0.0.0.0
api_port = 9000

[master.paths]
prefix = "/mnt/data/"   # stripped from paths before sending to slaves

[master.scan]
extensions = [".mkv", ".mp4", ".avi", ".mov"]
# min_size = 0
# max_size = 0

# ---------------------------------------------------------------------------

[slave]
bind        = "localhost"
api_port    = 8000
master_host = "localhost"
master_port = 9000
id          = "storage-01"   # omit to auto-generate and persist a UUID

[slave.paths]
prefix = "/mnt/files/"   # prepended to paths from master; omit to reuse master prefix

[slave.ffmpeg]
bin        = "ffmpeg"
output_dir = "/mnt/output"
# extra_args = ""
# encoders   = ["libx265", "nvenc"]   # restrict dashboard dropdown

[slave.ffmpeg.encoder.libx265]
display_name = "Software"
video_args   = "-c:v libx265"

# [slave.ffmpeg.encoder.videotoolbox]
# display_name = "Apple"
# video_args   = "-c:v hevc_videotoolbox -q:v 65"

# [slave.ffmpeg.encoder.nvenc_hq]
# display_name = "NVIDIA HQ"
# video_args   = "-c:v hevc_nvenc -preset p7 -cq 18"

[slave.worker]
poll_interval          = 5
cancel_projected_ratio = 1.0   # cancel if projected output > source; 0 = disabled
cancel_min_progress    = 10.0  # minimum % progress before check kicks in

# ---------------------------------------------------------------------------

[web]
bind        = "localhost"
port        = 8080
master_host = "localhost"
master_port = 9000
username    = "admin"
password    = "change-me"
secret_key  = "change-me-use-a-long-random-string"
