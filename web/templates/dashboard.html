{% extends "base.html" %}
{% block content %}

<div class="topbar" id="topbar">
  <div class="topbar-logo">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--accent)"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
    packa
    <span style="font-size:11px;font-weight:400;color:var(--text-faint);font-family:'IBM Plex Mono',monospace;letter-spacing:0">{{ version }} · {{ commit }}</span>
  </div>
  <div id="processing-pill" style="display:none" class="processing-pill">● <span id="processing-count">0</span> processing</div>
  <div class="topbar-sep"></div>
  <button class="btn btn-sm" id="topbar-scan-btn" onclick="topbarScanClick()" style="font-size:11px;padding:3px 10px;height:26px"></button>
  <div class="status-pill">
    <div class="status-dot connecting" id="status-dot"></div>
    <span id="status-label">Connecting…</span>
  </div>
  <button class="icon-btn" onclick="fetchAll()" title="Refresh">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
  </button>
  <button class="icon-btn" onclick="toggleTheme()" title="Toggle theme" id="theme-btn">
    <svg id="theme-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42M12 17a5 5 0 1 0 0-10 5 5 0 0 0 0 10z"/></svg>
  </button>
  {% if auth_enabled %}
  <form method="post" action="/logout" style="margin:0">
    <button class="icon-btn" type="submit" title="Sign out">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
    </button>
  </form>
  {% endif %}
</div>

<div class="tabs-bar" id="tabs-bar">
  <div class="tab active" data-tab="overview" onclick="setTab('overview')">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
    Overview
  </div>
  <div class="tab" data-tab="files" onclick="setTab('files')">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8zM14 2v6h6M9 13h6M9 17h6"/></svg>
    Files
    <span class="tab-badge" id="tab-badge-files">0</span>
  </div>
  <div class="tab" data-tab="stats" onclick="setTab('stats')">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
    Statistics
  </div>
  <div class="tab" data-tab="workers" onclick="setTab('workers')">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h20v6H2zM2 15h20v6H2zM6 9v.01M6 21v.01M10 9v.01M10 21v.01"/></svg>
    Workers
    <span class="tab-badge" id="tab-badge-workers">0</span>
  </div>
  <div class="tab" data-tab="master" onclick="setTab('master')">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19.07 4.93A10 10 0 0 0 6.99 3.34"/><path d="M4 6h.01"/><path d="M2.29 9.62A10 10 0 1 0 21.31 8.35"/><path d="M16.24 7.76A6 6 0 1 0 8.23 16.67"/><path d="M12 18h.01"/><path d="M17.99 11.66A6 6 0 0 1 15.77 16.67"/><circle cx="12" cy="12" r="2"/><path d="m13.41 10.59 5.66-5.66"/></svg>
    Master
  </div>
  <div class="tab" data-tab="settings" onclick="setTab('settings')">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    Settings
  </div>
</div>

<div class="main">
  <div id="tab-overview"></div>
  <div id="tab-files" style="display:none"></div>
  <div id="tab-stats" style="display:none"></div>
  <div id="tab-workers" style="display:none"></div>
  <div id="tab-master" style="display:none"></div>
  <div id="tab-settings" style="display:none"></div>
</div>

<div class="toast-container" id="toast-container"></div>

<div id="status-modal-backdrop" class="modal-backdrop" style="display:none" onclick="closeStatusModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span class="modal-title" id="status-modal-title"></span>
      <button class="icon-btn" onclick="closeStatusModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body" id="status-modal-body"></div>
  </div>
</div>

<script>window._INIT_DATA = {{ data | tojson }};</script>
<script src="/static/dashboard.js?v={{ commit }}"></script>
{% endblock %}
