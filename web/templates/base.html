<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📦</text></svg>">
  <title>Packa</title>
  <script>
    (function() {
      var t = localStorage.getItem('theme') || 'system';
      if (t !== 'system') document.documentElement.dataset.theme = t;
    })();
  </script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <nav>
    <span class="brand">📦 PACKA</span>
    <div class="nav-right">
      <div class="theme-picker" id="theme-picker">
        <button class="theme-btn" data-t="light" onclick="_setTheme('light')">Light</button>
        <button class="theme-btn" data-t="system" onclick="_setTheme('system')">System</button>
        <button class="theme-btn" data-t="dark"  onclick="_setTheme('dark')">Dark</button>
      </div>
      {% block nav_right %}{% endblock %}
    </div>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
  <script src="/static/theme.js"></script>
</body>
</html>
