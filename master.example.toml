# Packa — master configuration
# Copy to master.toml and adjust values, then start with:
#   python -m master.master --config master.toml

[paths]
# Prefix to strip from file paths before sending to slaves.
# Example: /mnt/data/katalog1/film.mkv → katalog1/film.mkv
prefix = "/mnt/data/"

[scan]
# Directory to scan recursively when POST /scan/start is called.
dir = "/mnt/data/"

# File extensions to include. Case-insensitive.
extensions = [".mkv", ".mp4", ".avi", ".mov"]
