services:
  worker:
    image: ghcr.io/planeturban/packa:v0.17.7
    environment:
      PACKA_ROLE: worker
      PACKA_CONFIG: /etc/packa/packa.toml
      PACKA_WORKER_ADVERTISE_HOST: "172.16.1.192"
      PACKA_WORKER_BOOTSTRAP_TOKEN: "${PACKA_WORKER_BOOTSTRAP_TOKEN}"
      PUID: "${PUID:-1000}"
      PGID: "${PGID:-1000}"
    ports:
      - "8000:8000"
    volumes:
      - ./packa.worker.toml:/etc/packa/packa.toml:ro
      - worker-mac-data:/data
      - worker-mac-output:/output
      - /Volumes/tv-archive:/mnt:ro
    restart: unless-stopped

volumes:
  worker-mac-data:
  worker-mac-output:
