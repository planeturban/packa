services:
  master:
    build: .
    # PACKA_ROLE defaults to master — no override needed.
    ports:
      - "9000:9000"
    volumes:
      - ./packa.toml:/data/packa.toml:ro
      - master-data:/data
      - /mnt/data:/mnt/data:ro
    restart: unless-stopped

  slave:
    build: .
    environment:
      PACKA_ROLE: slave
    ports:
      - "8000:8000"
    volumes:
      - ./packa.toml:/data/packa.toml:ro
      - slave-data:/data
      # Mount the source and output directories that ffmpeg reads/writes.
      # Adjust these paths to match your setup.
      - /mnt/data:/mnt/data:ro
      - /mnt/output:/mnt/output
    depends_on:
      - master
    restart: unless-stopped

  web:
    build: .
    environment:
      PACKA_ROLE: web
    ports:
      - "8080:8080"
    volumes:
      - ./packa.toml:/data/packa.toml:ro
      - web-data:/data
    depends_on:
      - master
    restart: unless-stopped

volumes:
  master-data:
  slave-data:
  web-data:
