# Packa — minimal configuration
# Only the settings you must change are included. Everything else uses defaults.
# Copy to packa.toml and adjust, then start with:
#   python -m master.master --config packa.toml
#   python -m worker.main   --config packa.toml
#   python -m web.main      --config packa.toml

[master.paths]
prefix = "/mnt/data/"   # root directory for scanning; stripped from paths sent to workers

[worker]
master_host = "localhost"
master_port = 9000

[worker.paths]
prefix = "/mnt/files/"  # prepended to relative paths received from master

[worker.ffmpeg]
output_dir = "/mnt/output"

[worker.ffmpeg.encoder.libx265]
display_name = "Software"
video_args   = "-c:v libx265"

[web]
master_host = "localhost"
master_port = 9000
